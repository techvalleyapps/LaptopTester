name: Build LaptopTester.exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaptopTester-exe
          path: dist/LaptopTester.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: LaptopTester ${{ github.ref_name }}
          body: |
            ## LaptopTester Desktop App

            Single-file portable Windows app — no install needed.

            **What it tests:**
            - ⌨️ Keyboard — visual key map, tracks every key pressed
            - 📷 Camera — live preview + resolution, FPS, device info
            - 🔊 Sound — full-range track + L/R channel tone test
            - 🔋 Battery — live WMI data, design/full charge capacity, health %, powercfg report

            **Requirements:** Windows 10/11 x64. App requests Administrator rights on launch for full WMI battery data.
          files: dist/LaptopTester.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
